<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/css/index.css">
</head>

<body>
    <header>
        <h1>CALCOLA IL PREZZO DEL TUO BIGLIETTO</h1>
    </header>

    <main>
        <div class="container">
            <div class="formContainer">
                <form id="cardForm" action="">
                    <div class="labelContainer">
                        <label class="label-input" for="name">Nome del passeggero:</label>
                        <label class="label-input" for="age"> Età del passeggero:</label>
                        <label class="label-input" for="km">Km da percorrrere:</label>
                    </div>
                    <div class="inputContainer">
                        <input id="name" type="text" placeholder="nome passeggero">
                        <input id="age" type="number" placeholder="eta del passeggero">
                        <input id="km" type="number" placeholder="kilometri">
                    </div>
                    <div class="btnContainer">
                        <button id="submit"> Genera</button>
                        <button id="reset" type="button"> Annulla</button>
                    </div>
                </form>
            </div>

            <br>
            <br>

            <h2 id="h1sub">IL TUO BIGLIETTO</h2>

            <div class="cardContainer">
                <h3> DETTAGLIO PASSEGGERI</h3>
                <div class="cardBody">
                    <div class="passenger-section">
                        <div class="info-card">
                            <span class="labelpassenger">NOME PASSEGGERO</span>
                            <span id="passengerName"  class="value"> - </span>
                        </div>
                    </div>
                    <div class="info-card">
                        <span class="label"> Offerta </span>
                        <span id="newOffer" class="value"> Biglietto standard </span>
                    </div>
                    <div class="info-card">
                        <span class="label"> Carrozza </span>
                        <span id="newSeat" class="value"> - </span>
                    </div>
                    <div class="info-card">
                        <span class="label"> Codice CP </span>
                        <span id="newCpCode" class="value"> - </span>
                    </div>
                    <div class="info-card">
                        <span class="label"> Costo BIglietto </span>
                        <span id="newPriceTicket" class="value"> - </span>
                    </div>



                </div>
            </div>
        </div>
    </main>
    <script src="/assets/javascript/index.js"></script>
</body>

</html>
